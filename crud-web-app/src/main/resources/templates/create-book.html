<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Book</title>
</head>
<body>

<h1>Add Book</h1>

<form th:action="@{/books}" th:object="${book}" method="post">
    Title: <input type="text" th:field="*{title}" /> <br><br>
    Description: <input type="text" th:field="*{description}"/><br><br>
    Date: <input type="date" th:field="*{releaseDate}"/><br><br>
    Author: <input type="text" th:field="*{author}"/><br><br>
    ISBN: <input type="text" th:field="*{isbn}"/><br><br>

    <button type="submit">Save</button>
</form>
</body>
</html>
