<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Books</title>
</head>
<body>
<h1>Book List</h1>

<!-- Formulär för att lägga till bok -->
<form th:action="@{/add}" method="post">
    <input type="text" name="title" placeholder="Title" required/>
    <input type="text" name="description" placeholder="Description" required/>
    <input type="date" name="releaseDate" placeholder="Release Date" required/>
    <input type="text" name="author" placeholder="Author" required/>
    <input type="text" name="isbn" placeholder="ISBN" required/>
    <button type="submit">Add Book</button>
</form>

<br/>

<!-- Tabell med alla böcker -->
<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Release Date</th>
        <th>Author</th>
        <th>ISBN</th>
        <th>Action</th>
    </tr>

    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.description}"></td>
        <td th:text="${book.releaseDate}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.isbn}"></td>
        <td>
            <form th:action="@{'/delete/' + ${book.id}}" method="post">
                <button type="submit">Delete</button>
            </form>
            <a th:href="@{/edit/{id}(id=${book.id})}">
                <button type="button">Edit</button></a>
        </td>
    </tr>
</table>
</body>
</html>
