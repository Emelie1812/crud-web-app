<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Books</title>
    <style>
        table {
            border-collapse: collapse; /* Slår ihop ramarna */
            width: 100%;
        }
        th, td {
            border: 1px solid black; /* Linjer mellan alla rader och kolumner */
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2; /* Lite färg på header */
        }
    </style>
</head>
<body>

    <h1>Book List</h1>

    <a href="/books/new">Add Book</a>
    <br>

    <table style="border: 1px solid black; border-collapse: collapse";>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Date</th>
            <th>Author</th>
            <th>ISBN</th>
        </tr>

        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.description}"></td>
            <td th:text="${book.releaseDate}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.isbn}"></td>
        </tr>
    </table>

</body>
</html>
